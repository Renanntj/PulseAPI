<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevSpace</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #060a12;
    --surface: #0d1525;
    --surface2: #111d30;
    --border: #1a2840;
    --accent: #2563eb;
    --accent-hover: #3b82f6;
    --text: #cbd5e1;
    --text-strong: #f1f5f9;
    --muted: #4b6080;
    --mono: 'Space Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; }

  /* TOPBAR */
  .topbar {
    position:sticky; top:0; z-index:50;
    height:56px; background:rgba(6,10,18,.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 1.5rem; gap:.75rem;
  }
  .logo { font-family:var(--mono); font-size:1rem; font-weight:700; color:var(--accent-hover); margin-right:auto; letter-spacing:-.5px; }
  .logo span { color:var(--muted); }

  .btn { font-family:var(--mono); font-size:.75rem; font-weight:700; letter-spacing:.04em; border-radius:6px; border:none; cursor:pointer; padding:.45rem 1rem; transition:all .15s; }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { color:var(--text-strong); border-color:var(--muted); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-hover); }
  .btn-danger { background:transparent; color:#f87171; border:1px solid #2d1a1a; }
  .btn-danger:hover { background:rgba(248,113,113,.08); }

  .user-chip { display:flex; align-items:center; gap:.5rem; font-size:.8125rem; color:var(--muted); }
  .avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:.65rem; font-weight:700; color:#fff; flex-shrink:0; }

  /* CONTAINER */
  .container { max-width:620px; margin:0 auto; padding:2rem 1rem 4rem; }

  /* NEW POST */
  .new-post { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:1.5rem; }
  .new-post-header { font-family:var(--mono); font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.75rem; }
  .new-post input, .new-post textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text-strong); font-family:var(--sans); font-size:.875rem; padding:.6rem .85rem; outline:none; margin-bottom:.6rem; transition:border-color .15s; }
  .new-post input:focus, .new-post textarea:focus { border-color:var(--accent); }
  .new-post textarea { resize:vertical; min-height:70px; }
  .new-post-footer { display:flex; align-items:center; gap:.75rem; }
  .file-btn { font-family:var(--mono); font-size:.7rem; color:var(--muted); background:transparent; border:1px dashed var(--border); border-radius:6px; padding:.4rem .75rem; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .file-btn:hover { border-color:var(--accent); color:var(--accent-hover); }
  #post-file { display:none; }
  .file-sel { font-size:.7rem; color:var(--accent-hover); font-family:var(--mono); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* POST CARD */
  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1rem; transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease; }
  .post-card:hover { border-color:rgba(37,99,235,.5); transform:translateY(-3px); box-shadow:0 8px 32px rgba(37,99,235,.12), 0 2px 8px rgba(0,0,0,.4); }
  .post-img { width:100%; max-height:320px; object-fit:cover; display:block; border-bottom:1px solid var(--border); transition:filter .25s ease; }
  .post-card:hover .post-img { filter:brightness(1.06); }
  .post-inner { padding:1rem; }
  .post-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
  .post-author { display:flex; align-items:center; gap:.5rem; }
  .post-author-name { font-size:.8125rem; font-weight:500; color:var(--text-strong); }
  .post-author-sub  { font-size:.7rem; color:var(--muted); font-family:var(--mono); }
  .post-id { font-family:var(--mono); font-size:.65rem; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:.15rem .45rem; }
  .post-title { font-family:var(--mono); font-weight:700; font-size:.9375rem; color:var(--text-strong); margin-bottom:.3rem; line-height:1.4; }
  .post-desc { font-size:.8125rem; color:var(--text); line-height:1.6; }
  .post-footer { display:flex; justify-content:flex-end; margin-top:.75rem; }

  /* LOADER / EMPTY */
  .loader, .empty { text-align:center; padding:3rem 0; color:var(--muted); font-size:.875rem; }
  .spin { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-left:.5rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* MODAL */
  .overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.65); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; padding:1rem; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem; width:100%; max-width:400px; animation:pop .2s ease; }
  @keyframes pop { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
  .modal-title { font-family:var(--mono); font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:var(--accent-hover); }
  .modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem; line-height:1; transition:color .15s; }
  .modal-close:hover { color:var(--text-strong); }
  .field { margin-bottom:.9rem; }
  .field label { display:block; font-size:.7rem; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.35rem; }
  .field input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text-strong); font-family:var(--sans); font-size:.875rem; padding:.6rem .85rem; outline:none; transition:border-color .15s; }
  .field input:focus { border-color:var(--accent); }
  .modal-footer { display:flex; justify-content:flex-end; gap:.6rem; margin-top:1.25rem; }
  .tabs { display:flex; margin-bottom:1.25rem; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .tab { flex:1; padding:.5rem; text-align:center; font-family:var(--mono); font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; color:var(--muted); background:transparent; border:none; transition:all .15s; }
  .tab.active { background:var(--accent); color:#fff; }
  .alert { font-size:.8rem; border-radius:6px; padding:.5rem .75rem; margin-bottom:.75rem; display:none; }
  .alert.show { display:block; }
  .alert-err { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); color:#fca5a5; }
  .alert-ok  { background:rgba(34,197,94,.1);  border:1px solid rgba(34,197,94,.2);  color:#86efac; }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">dev<span>/</span>space</div>
  <div id="tb-guest" style="display:flex;gap:.5rem">
    <button class="btn btn-ghost" onclick="openAuth('login')">Entrar</button>
    <button class="btn btn-primary" onclick="openAuth('register')">Criar conta</button>
  </div>
  <div id="tb-user" style="display:none;align-items:center;gap:.75rem">
    <div class="user-chip">
      <div class="avatar" id="av-init">?</div>
      <span id="av-name" style="font-size:.8125rem"></span>
    </div>
    <button class="btn btn-danger" onclick="doLogout()">Sair</button>
  </div>
</header>

<div class="container">
  <div id="new-post-box" class="new-post" style="display:none">
    <div class="new-post-header">// novo post</div>
    <div id="np-alert" class="alert"></div>
    <input type="text" id="np-titulo" placeholder="Título"/>
    <textarea id="np-desc" placeholder="Descrição (opcional)"></textarea>
    <div class="new-post-footer">
      <label class="file-btn" for="post-file">📎 Imagem</label>
      <input type="file" id="post-file" accept="image/*" onchange="onFile(this)"/>
      <span class="file-sel" id="file-sel"></span>
      <button class="btn btn-primary" onclick="doCreatePost()">Publicar</button>
    </div>
  </div>
  <div id="posts-list"></div>
</div>

<!-- AUTH MODAL -->
<div class="overlay" id="auth-overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="auth-title">Entrar</span>
      <button class="modal-close" onclick="closeAuth()">✕</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-l" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tab-r" onclick="switchTab('register')">Criar conta</button>
    </div>
    <div id="auth-alert" class="alert"></div>
    <div id="login-f">
      <div class="field"><label>E-mail</label><input type="email" id="l-email" placeholder="seu@email.com"/></div>
      <div class="field"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="doLogin()">Entrar</button></div>
    </div>
    <div id="register-f" style="display:none">
      <div class="field"><label>Nome</label><input type="text" id="r-nome" placeholder="Seu nome"/></div>
      <div class="field"><label>Usuário</label><input type="text" id="r-usuario" placeholder="sem_espacos"/></div>
      <div class="field"><label>E-mail</label><input type="email" id="r-email" placeholder="seu@email.com"/></div>
      <div class="field"><label>Senha</label><input type="password" id="r-senha" placeholder="••••••••"/></div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="doRegister()">Criar conta</button></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Editar post</span>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div id="edit-alert" class="alert"></div>
    <div class="field"><label>Título</label><input type="text" id="e-titulo"/></div>
    <div class="field"><label>Descrição</label><input type="text" id="e-desc"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEdit()">Cancelar</button>
      <button class="btn btn-primary" onclick="doEditPost()">Salvar</button>
    </div>
  </div>
</div>

<script>
const BASE = 'http://127.0.0.1:8000';
let token = localStorage.getItem('ds_token') || null;
let me    = JSON.parse(localStorage.getItem('ds_user') || 'null');
let editId = null;

init();

async function init() {
  if (token && me) renderLoggedIn(); else renderLoggedOut();
  loadPosts();
}

function renderLoggedIn() {
  document.getElementById('tb-guest').style.display = 'none';
  const tb = document.getElementById('tb-user');
  tb.style.display = 'flex';
  document.getElementById('av-init').textContent = (me.nome || me.usuario || '?')[0].toUpperCase();
  document.getElementById('av-name').textContent = '@' + (me.usuario || me.id);
  document.getElementById('new-post-box').style.display = 'block';
}

function renderLoggedOut() {
  document.getElementById('tb-guest').style.display = 'flex';
  document.getElementById('tb-user').style.display = 'none';
  document.getElementById('new-post-box').style.display = 'none';
}

// AUTH MODAL
function openAuth(tab) { switchTab(tab); document.getElementById('auth-overlay').classList.add('open'); }
function closeAuth()   { document.getElementById('auth-overlay').classList.remove('open'); }

function switchTab(tab) {
  document.getElementById('login-f').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('register-f').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('tab-l').classList.toggle('active', tab==='login');
  document.getElementById('tab-r').classList.toggle('active', tab==='register');
  document.getElementById('auth-title').textContent = tab==='login' ? 'Entrar' : 'Criar conta';
  hideAlert('auth-alert');
}

document.getElementById('auth-overlay').addEventListener('click', e => { if(e.target.id==='auth-overlay') closeAuth(); });
document.getElementById('edit-overlay').addEventListener('click', e => { if(e.target.id==='edit-overlay') closeEdit(); });

function showAlert(id, msg, type='err') {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = `alert alert-${type} show`;
  if (type==='ok') setTimeout(() => hideAlert(id), 3000);
}
function hideAlert(id) { document.getElementById(id).className = 'alert'; }

// LOGIN
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const senha = document.getElementById('l-senha').value;
  if (!email||!senha) return showAlert('auth-alert','Preencha todos os campos.');
  try {
    const res  = await fetch(`${BASE}/user/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
    const data = await res.json();
    if (!res.ok) return showAlert('auth-alert', data.detail||'Credenciais inválidas.');
    token = data.access_token;
    localStorage.setItem('ds_token', token);

    // Decode JWT payload para pegar o sub (user id)
    let payload = {};
    try { payload = JSON.parse(atob(token.split('.')[1])); } catch {}
    const userId = payload.sub || payload.id || null;

    // Guarda info do usuário — tenta buscar perfil pela rota pública se tiver o username
    // Como só temos o id no token, guardamos um placeholder e buscamos pelo id
    me = { id: userId, nome: email.split('@')[0], usuario: email.split('@')[0] };

    // Tenta buscar mais dados se a API expor /user/me ou similar
    // Por ora usa o email como fallback limpo
    if (payload.nome)    me.nome    = payload.nome;
    if (payload.usuario) me.usuario = payload.usuario;

    localStorage.setItem('ds_user', JSON.stringify(me));
    closeAuth();
    renderLoggedIn();
    loadPosts();
  } catch { showAlert('auth-alert','Erro de conexão.'); }
}

// REGISTER
async function doRegister() {
  const nome    = document.getElementById('r-nome').value.trim();
  const usuario = document.getElementById('r-usuario').value.trim();
  const email   = document.getElementById('r-email').value.trim();
  const senha   = document.getElementById('r-senha').value;
  if (!nome||!usuario||!email||!senha) return showAlert('auth-alert','Preencha todos os campos.');
  try {
    const res  = await fetch(`${BASE}/user/criar-usuario`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,usuario,email,senha})});
    const data = await res.json();
    if (!res.ok) return showAlert('auth-alert', data.detail||'Erro ao criar conta.');
    showAlert('auth-alert','Conta criada! Faça login.','ok');
    // Pré-preenche o email no login
    document.getElementById('l-email').value = email;
    setTimeout(() => switchTab('login'), 1500);
  } catch { showAlert('auth-alert','Erro de conexão.'); }
}

// LOGOUT
function doLogout() {
  token=null; me=null;
  localStorage.removeItem('ds_token'); localStorage.removeItem('ds_user');
  renderLoggedOut(); loadPosts();
}

// POSTS
async function loadPosts() {
  const el = document.getElementById('posts-list');
  el.innerHTML = '<div class="loader">Carregando <span class="spin"></span></div>';
  try {
    const res = await fetch(`${BASE}/principal/publicacoes`);
    if (!res.ok) throw new Error();
    const posts = await res.json();
    if (!posts.length) { el.innerHTML='<div class="empty">Nenhuma publicação ainda.</div>'; return; }
    el.innerHTML = posts.slice().reverse().map(renderPost).join('');
  } catch {
    el.innerHTML='<div class="empty">404 — Serviço fora do ar.</div>';
  }
}

function renderPost(p) {
  // autor pode vir como objeto (se o schema serializar o relacionamento)
  // ou só como autor_id (se não serializar) — tratamos os dois casos
  const autorNome    = p.autor?.nome    || p.nome    || `User ${p.autor_id}`;
  const autorUsuario = p.autor?.usuario || p.usuario || String(p.autor_id);
  const inicial      = autorNome[0].toUpperCase();

  const imgHtml  = `<img class="post-img" src="${BASE}/principal/imagem/${p.id}/" alt="imagem" onerror="this.style.display='none'"/>`;
  const descHtml = p.descricao ? `<p class="post-desc">${esc(p.descricao)}</p>` : '';

  const isOwner = me && String(me.id) === String(p.autor_id);
  const editBtn = isOwner
    ? `<button class="btn btn-ghost" style="font-size:.7rem;padding:.3rem .7rem"
         onclick="openEdit(${p.id},'${esc(p.titulo)}','${esc(p.descricao||'')}')">Editar</button>`
    : '';

  return `
  <article class="post-card">
    ${imgHtml}
    <div class="post-inner">
      <div class="post-meta">
        <div class="post-author">
          <div class="avatar" style="width:26px;height:26px;font-size:.6rem">${inicial}</div>
          <div>
            <div class="post-author-name">${esc(autorNome)}</div>
            <div class="post-author-sub">@${esc(autorUsuario)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span class="post-id">#${p.id}</span>
          ${editBtn}
        </div>
      </div>
      <div class="post-title">${esc(p.titulo)}</div>
      ${descHtml}
    </div>
  </article>`;
}

function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// FILE
function onFile(input) {
  document.getElementById('file-sel').textContent = input.files.length ? input.files[0].name : '';
}

// CRIAR POST
async function doCreatePost() {
  const titulo = document.getElementById('np-titulo').value.trim();
  const desc   = document.getElementById('np-desc').value.trim();
  const file   = document.getElementById('post-file').files[0];
  if (!titulo) return showAlert('np-alert','Título é obrigatório.');
  const fd = new FormData();
  fd.append('titulo', titulo);
  if (desc) fd.append('descricao', desc);
  if (file) fd.append('arquivo', file);
  try {
    const res  = await fetch(`${BASE}/posts/criar-post`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
    const data = await res.json();
    if (!res.ok) return showAlert('np-alert', data.detail||'Erro ao publicar.');
    document.getElementById('np-titulo').value='';
    document.getElementById('np-desc').value='';
    document.getElementById('post-file').value='';
    document.getElementById('file-sel').textContent='';
    hideAlert('np-alert');
    loadPosts();
  } catch { showAlert('np-alert','Erro de conexão.'); }
}

// EDITAR
function openEdit(id, titulo, desc) {
  editId=id;
  document.getElementById('e-titulo').value=titulo;
  document.getElementById('e-desc').value=desc;
  hideAlert('edit-alert');
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEdit() { document.getElementById('edit-overlay').classList.remove('open'); editId=null; }

async function doEditPost() {
  const titulo    = document.getElementById('e-titulo').value.trim();
  const descricao = document.getElementById('e-desc').value.trim();
  if (!titulo) return showAlert('edit-alert','Título não pode ser vazio.');
  try {
    const res  = await fetch(`${BASE}/posts/editar-post/${editId}`,{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({titulo,descricao})});
    const data = await res.json();
    if (!res.ok) return showAlert('edit-alert', data.detail||'Erro ao salvar.');
    closeEdit(); loadPosts();
  } catch { showAlert('edit-alert','Erro de conexão.'); }
}
</script>
</body>
</html>
